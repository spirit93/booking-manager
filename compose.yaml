services:
  postgres:
    image: postgres:17
    container_name: booking-manager-postgres
    environment:
      POSTGRES_DB: booking_manager
      POSTGRES_USER: booking_manager
      POSTGRES_PASSWORD: booking_manager
    ports:
      - "5432:5432"
    volumes:
      - booking-manager-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_manager -d booking_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  booking-manager-postgres-data:
