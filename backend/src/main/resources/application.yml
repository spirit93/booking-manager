spring:
  application:
    name: booking-manager
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/booking_manager}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.vits.booking: ${BOOKING_LOG_LEVEL:INFO}

booking:
  days:
    min: ${BOOKING_DAY_MIN:2026-01-01}
    max: ${BOOKING_DAY_MAX:2026-12-31}
